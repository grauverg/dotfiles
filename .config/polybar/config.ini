[global/wm]
include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini

[bar/vsevolod]
height = 30
background = #88000000 
foreground = ${colors.foreground}
border-size = 0
border-color = #00000000
fixed-center = true
wm-restack = generic

modules-left = filesystem 
modules-center = temperature space space memory space space cpu
modules-right = battery pulseaudio xkeyboard time space wlan

font-0 = JetBrainsMono Nerd Font:style=Bold:pixelsize=10;3
font-1 = JetBrainsMono Nerd Font:size=13;5
font-2 = Material Design Icons:style=Bold:size=13;3
font-3 = unifont:fontformat=truetype:size=13:antialias=true;
